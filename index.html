<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>西安以旧换新备注生成器</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
    background:linear-gradient(135deg,#f5f7fa 0%,#e4e9f2 100%);
    min-height:100vh;
    padding:20px 12px;
    color:#1d1d1f;
}

.container{
    max-width:430px;
    margin:auto;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(30px);
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
}

header{
    background:linear-gradient(90deg,#007aff,#5ac8fa);
    color:#fff;
    text-align:center;
    padding:28px 20px;
}

header h1{
    font-size:22px;
    font-weight:600;
    line-height:1.4;
}

.content{
    padding:24px 20px 30px;
}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#666;
    font-size:15px;
}

select,
input{
    width:100%;
    padding:15px;
    font-size:17px;
    border-radius:14px;
    border:1px solid #d2d2d7;
    outline:none;
}

input:focus,
select:focus{
    border-color:#007aff;
}

.calcBox{
    background:#f5f5f7;
    border-radius:18px;
    padding:18px;
    margin-bottom:20px;
    line-height:2;
    font-size:16px;
}

.calcBox div{
    display:flex;
    justify-content:space-between;
}

.calcBox span:last-child{
    font-weight:600;
}

.result{
    border:1px solid #d2d2d7;
    border-radius:18px;
    padding:18px;
    min-height:180px;
    white-space:pre-wrap;
    word-break:break-all;
    line-height:1.7;
    font-size:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    border:none;
    background:#34c759;
    color:#fff;
    font-size:18px;
    padding:18px;
    border-radius:50px;
    cursor:pointer;
}

button:active{
    transform:scale(.98);
}

.success{
    text-align:center;
    color:#34c759;
    margin-top:12px;
    opacity:0;
    transition:.3s;
}
</style>
</head>

<body>

<div class="container">

<header>
<h1>
西安以旧换新补贴<br>
开票备注生成器
</h1>
</header>

<div class="content">

<div class="form-group">
<label>区县</label>
<select id="district">
<option>新城区</option>
<option>碑林区</option>
<option>莲湖区</option>
<option>灞桥区</option>
<option>未央区</option>
<option>雁塔区</option>
<option>阎良区</option>
<option>临潼区</option>
<option>长安区</option>
<option>高陵区</option>
<option>鄠邑区</option>
<option>蓝田县</option>
<option>周至县</option>
<option>西咸新区</option>
<option>高新区</option>
<option>经开区</option>
<option>曲江新区</option>
<option>浐灞国际港</option>
<option>航天基地</option>
</select>
</div>

<div class="form-group">
<label>初始价格（元）</label>
<input
id="price"
type="number"
step="1"
placeholder="请输入商品初始价格"
value="">
</div>

<div class="form-group">
<label>手机号</label>
<input
id="phone"
value="">
</div>

<div class="calcBox">
<div><span>商品原价</span><span id="showOriginal">3499 元</span></div>
<div><span>国补金额（15%，500封顶）</span><span id="showDiscount">500 元</span></div>
<div><span>最终成交价</span><span id="showFinal">2999 元</span></div>
</div>

<div class="result" id="result"></div>

<button onclick="copyText()">复制备注</button>

<div class="success" id="success">
✓ 已复制到剪贴板
</div>

</div>

</div>

<script>

const district=document.getElementById("district");
const price=document.getElementById("price");
const phone=document.getElementById("phone");

const result=document.getElementById("result");
const success=document.getElementById("success");

const showOriginal=document.getElementById("showOriginal");
const showDiscount=document.getElementById("showDiscount");
const showFinal=document.getElementById("showFinal");

function money(num){
    return Number(num.toFixed(2)).toString();
}

function calc(){

    let original=parseFloat(price.value);

    if(isNaN(original)||original<=0){

        showOriginal.innerText="-";
        showDiscount.innerText="-";
        showFinal.innerText="-";

        result.innerText="请输入正确的商品初始价格";

        return;
    }

    // 国补15%，最高500元
    let discount=original*0.15;

    if(discount>500){
        discount=500;
    }

    discount=Number(discount.toFixed(2));

    let final=Number((original-discount).toFixed(2));

    showOriginal.innerText=money(original)+" 元";
    showDiscount.innerText=money(discount)+" 元";
    showFinal.innerText=money(final)+" 元";

    result.innerText=
`西安以旧换新，购买方地址，陕西省西安市${district.value}，产品初始销售价格${money(original)}元，最终销售价格${money(final)}元，享受补贴资金数额${money(discount)}元，其他优惠金额0元，消费者实际支付金额${money(final)}元，消费者手机号${phone.value||"未填写"}`;

}

district.onchange=calc;
price.oninput=calc;
phone.oninput=calc;

calc();

function copyText(){

    navigator.clipboard.writeText(result.innerText);

    success.style.opacity=1;

    setTimeout(()=>{
        success.style.opacity=0;
    },1500);

}

</script>

</body>
</html>
